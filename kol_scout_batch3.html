w){const b=JSON.parse(document.getElementById('payload').textContent);const k=await dk(pw,b64(b.salt),b.iterations);const p=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(b.iv)},k,b64(b.ciphertext));return new TextDecoder().decode(p);}async function reveal(pw){const html=await dec(pw);try{localStorage.setItem("cop_pw",pw);}catch(_){}document.open();document.write(html);document.close();}async function gateSubmit(e){e.preventDefault();const i=document.getElementById('gate-input');const er=document.getElementById('gate-err');er.textContent='';try{await reveal(i.value);}catch(x){er.textContent='wrong password';i.value='';i.focus();}return false;}(async()=>{try{const c=localStorage.getItem("cop_pw");if(c)await reveal(c);}catch(_){try{localStorage.removeItem("cop_pw");}catch(_){}}})();</script></body></html>
